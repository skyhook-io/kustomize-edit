name: 'Skyhook Kustomize Edit'
description: 'Edit kustomize overlays - set images, labels, annotations, name/namespace, replicas, ConfigMap values'
author: 'Skyhook'

branding:
  icon: 'edit'
  color: 'purple'

inputs:
  overlay_dir:
    description: 'Path to kustomize overlay directory'
    required: true
  debug:
    description: 'Enable debug output'
    required: false
    default: 'false'
  image:
    description: 'Container image (e.g., registry.io/app or registry.io/app:v1.2.3)'
    required: false
  tag:
    description: 'Image tag (e.g., v1.2.3, latest, sha-abc123)'
    required: false
  images_json:
    description: 'Multiple images as JSON array: [{"name":"registry.io/app","newName":"other.io/app","newTag":"v1.2.3"}]'
    required: false
  version_label:
    description: 'Value for app.kubernetes.io/version label'
    required: false
  annotations:
    description: 'Annotations to add (key:value or key=value format, one per line)'
    required: false
  labels:
    description: 'Labels to add (key:value or key=value format, one per line)'
    required: false
  name_prefix:
    description: 'Name prefix to set'
    required: false
  name_suffix:
    description: 'Name suffix to set'
    required: false
  namespace:
    description: 'Namespace to set'
    required: false
  replicas:
    description: 'Replicas count to set (JSON format, e.g., [{"name":"deployment-name","count":3}])'
    required: false
  env_patches:
    description: 'Environment file patches (JSON format matching patch-env-files, e.g., {"container.env":{"SENTRY_RELEASE":"v1.2.3"}})'
    required: false
  environment_values_file:
    description: 'Name of the environment values file to read from the overlay directory'
    required: false
    default: 'environment-values.env'
  patch_prefix:
    description: 'Prefix for generated patch files. Defaults to a random prefix to avoid collisions.'
    required: false
    default: ''

outputs:
  overlay_dir:
    description: 'Path to the edited overlay'
    value: ${{ inputs.overlay_dir }}
  kustomization_file:
    description: 'Path to kustomization.yaml'
    value: ${{ inputs.overlay_dir }}/kustomization.yaml
  applied_environment_keys:
    description: 'Comma-separated list of environment value keys that were applied'
    value: ${{ steps.env_values.outputs.applied_keys }}
  skipped_environment_keys:
    description: 'Comma-separated list of unrecognized environment value keys'
    value: ${{ steps.env_values.outputs.skipped_keys }}

runs:
  using: 'composite'
  steps:
    - name: Check required tools
      shell: bash
      run: |
        set -euo pipefail
        echo "🔍 Checking required tools..."

        # Check for kustomize
        if ! command -v kustomize >/dev/null 2>&1; then
          echo "::error::kustomize not found. Please install it first. See: https://kubectl.docs.kubernetes.io/installation/kustomize/"
          exit 1
        fi

        # Check for jq (needed for replicas)
        if [ -n "${{ inputs.replicas }}" ] && ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq not found. Required for replicas input. Install with: apt-get install -y jq"
          exit 1
        fi

        # Check for yq (needed for version_label, environment values, etc.)
        if ! command -v yq >/dev/null 2>&1; then
          echo "::warning::yq not found. Will be installed automatically if needed."
        fi

        echo "✅ Required tools available"
    
    - name: Validate overlay directory
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -d "${{ inputs.overlay_dir }}" ]; then
          echo "::error::Overlay directory not found: ${{ inputs.overlay_dir }}"
          exit 1
        fi
        
        if [ ! -f "${{ inputs.overlay_dir }}/kustomization.yaml" ]; then
          echo "::error::No kustomization.yaml found in ${{ inputs.overlay_dir }}"
          exit 1
        fi
        
        echo "✅ Found kustomization.yaml in: ${{ inputs.overlay_dir }}"

    - name: Patch environment files
      if: inputs.env_patches != ''
      uses: skyhook-io/patch-env-files@v1
      with:
        path: ${{ inputs.overlay_dir }}
        patches: ${{ inputs.env_patches }}

    - name: Apply environment values
      id: env_values
      shell: bash
      run: |
        set -euo pipefail

        OVERLAY_DIR="${{ inputs.overlay_dir }}"
        ENV_FILE_NAME="${{ inputs.environment_values_file }}"
        ENV_FILE_PATH="${OVERLAY_DIR}/${ENV_FILE_NAME}"
        PREFIX="${{ inputs.patch_prefix }}"

        # Resolve prefix
        if [ -z "$PREFIX" ]; then
          PREFIX="skyhook-$(openssl rand -hex 4)-"
        fi

        # Phase 1: Read env file
        if [ ! -f "$ENV_FILE_PATH" ]; then
          echo "ℹ️ No environment values file found at ${ENV_FILE_PATH}, skipping"
          echo "applied_keys=" >> $GITHUB_OUTPUT
          echo "skipped_keys=" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Parse env file into a temp file (key=value lines, comments/blanks/malformed stripped)
        ENV_PARSED=$(mktemp)
        while IFS= read -r line || [ -n "$line" ]; do
          line="$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')"
          [[ -z "$line" || "$line" == \#* ]] && continue
          # Skip lines without = (malformed)
          if [[ "$line" != *"="* ]]; then
            echo "⚠️ Skipping malformed line (no '='): $line"
            continue
          fi
          # Skip lines with empty key (e.g., "=value")
          _key="${line%%=*}"
          if [ -z "$_key" ]; then
            echo "⚠️ Skipping line with empty key: $line"
            continue
          fi
          echo "$line" >> "$ENV_PARSED"
        done < "$ENV_FILE_PATH"

        ENV_KEY_COUNT=$(wc -l < "$ENV_PARSED" | tr -d ' ')
        if [ "$ENV_KEY_COUNT" = "0" ]; then
          echo "ℹ️ No keys found in ${ENV_FILE_PATH}, skipping"
          echo "applied_keys=" >> $GITHUB_OUTPUT
          echo "skipped_keys=" >> $GITHUB_OUTPUT
          rm -f "$ENV_PARSED"
          exit 0
        fi

        echo "📋 Found ${ENV_KEY_COUNT} key(s) in ${ENV_FILE_PATH}"

        # Phase 2: Idempotency cleanup
        cd "$OVERLAY_DIR"
        if [ -z "$PREFIX" ]; then
          echo "::error::Internal error: patch prefix is empty"
          exit 1
        fi
        rm -f ${PREFIX}*.yaml
        export YQ_PREFIX="$PREFIX"
        if yq -e '.patches' kustomization.yaml >/dev/null 2>&1; then
          yq -i 'del(.patches[] | select(.path | test("^" + env(YQ_PREFIX))))' kustomization.yaml 2>/dev/null || true
          PATCH_COUNT=$(yq '.patches | length' kustomization.yaml 2>/dev/null || echo "0")
          if [ "$PATCH_COUNT" = "0" ]; then
            yq -i 'del(.patches)' kustomization.yaml 2>/dev/null || true
          fi
        fi

        # Phase 3: Resource discovery — store as lines in a file: kind|name|rule_count|has_tls|hosts|tls_hosts
        RESOURCES_FILE=$(mktemp)

        BUILD_OUTPUT=$(kustomize build . 2>/dev/null || echo "")
        if [ -n "$BUILD_OUTPUT" ]; then
          TEMP_DIR=$(mktemp -d)
          echo "$BUILD_OUTPUT" | yq -s "\"${TEMP_DIR}/doc_\" + \$index" 2>/dev/null || true
          for doc_file in "$TEMP_DIR"/doc_*; do
            [ -f "$doc_file" ] || continue
            kind=$(yq '.kind // ""' "$doc_file")
            name=$(yq '.metadata.name // ""' "$doc_file")
            if [ "$kind" = "Ingress" ]; then
              rule_count=$(yq '.spec.rules | length' "$doc_file")
              has_tls=$(yq 'select(.spec.tls) | .spec.tls | length > 0' "$doc_file" 2>/dev/null || echo "false")
              [ -z "$has_tls" ] && has_tls="false"
              hosts=$(yq -r '[.spec.rules[].host] | join(",")' "$doc_file")
              tls_hosts=$(yq -r '[.spec.tls[].hosts[]] | join(",")' "$doc_file" 2>/dev/null || echo "")
              echo "Ingress|${name}|${rule_count}|${has_tls}|${hosts}|${tls_hosts}" >> "$RESOURCES_FILE"
            elif [ "$kind" = "HTTPRoute" ]; then
              hostnames=$(yq -r '[.spec.hostnames[]] | join(",")' "$doc_file")
              hostname_count=$(yq '.spec.hostnames | length' "$doc_file")
              echo "HTTPRoute|${name}|${hostname_count}|false|${hostnames}|" >> "$RESOURCES_FILE"
            fi
          done
          rm -rf "$TEMP_DIR"
        fi

        # Strategy B: recursive file scan (fallback if kustomize build found nothing)
        RESOURCE_COUNT=$(wc -l < "$RESOURCES_FILE" | tr -d ' ')
        if [ "$RESOURCE_COUNT" = "0" ]; then
          echo "🔍 kustomize build found no Ingress/HTTPRoute, trying file scan..."
          scan_yaml_files() {
            local dir="$1"
            local kfile="$dir/kustomization.yaml"
            [ -f "$kfile" ] || return 0
            for field in resources components bases; do
              local paths
              paths=$(yq ".$field // [] | .[]" "$kfile" 2>/dev/null || true)
              while IFS= read -r p; do
                [ -z "$p" ] && continue
                local full_path="$dir/$p"
                if [ -d "$full_path" ]; then
                  scan_yaml_files "$full_path"
                elif [ -f "$full_path" ]; then
                  local fkind fname
                  fkind=$(yq '.kind // ""' "$full_path" 2>/dev/null || echo "")
                  fname=$(yq '.metadata.name // ""' "$full_path" 2>/dev/null || echo "")
                  if [ "$fkind" = "Ingress" ]; then
                    local frule_count fhas_tls fhosts ftls_hosts
                    frule_count=$(yq '.spec.rules | length' "$full_path")
                    fhas_tls=$(yq 'select(.spec.tls) | .spec.tls | length > 0' "$full_path" 2>/dev/null || echo "false")
                    [ -z "$fhas_tls" ] && fhas_tls="false"
                    fhosts=$(yq -r '[.spec.rules[].host] | join(",")' "$full_path")
                    ftls_hosts=$(yq -r '[.spec.tls[].hosts[]] | join(",")' "$full_path" 2>/dev/null || echo "")
                    echo "Ingress|${fname}|${frule_count}|${fhas_tls}|${fhosts}|${ftls_hosts}" >> "$RESOURCES_FILE"
                  elif [ "$fkind" = "HTTPRoute" ]; then
                    local fhostnames fhostname_count
                    fhostnames=$(yq -r '[.spec.hostnames[]] | join(",")' "$full_path")
                    fhostname_count=$(yq '.spec.hostnames | length' "$full_path")
                    echo "HTTPRoute|${fname}|${fhostname_count}|false|${fhostnames}|" >> "$RESOURCES_FILE"
                  fi
                fi
              done <<< "$paths"
            done
          }
          scan_yaml_files "."
        fi

        RESOURCE_COUNT=$(wc -l < "$RESOURCES_FILE" | tr -d ' ')
        echo "🔍 Discovered ${RESOURCE_COUNT} resource(s)"
        cat "$RESOURCES_FILE" | while IFS= read -r line; do echo "  - $line"; done

        # Helper: look up a host mapping from a mappings file
        lookup_host_mapping() {
          local host="$1" mappings_file="$2"
          grep "^${host}=" "$mappings_file" 2>/dev/null | head -1 | cut -d= -f2-
        }

        # Phase 4: Key handlers
        APPLIED_KEYS=""
        SKIPPED_KEYS=""

        while IFS= read -r env_line || [ -n "$env_line" ]; do
          key="${env_line%%=*}"
          value="${env_line#*=}"

          case "$key" in
            EXTERNAL_HOST)
              echo "🌐 Processing EXTERNAL_HOST=${value}"

              # Detect mode: mapping vs simple
              MAPPING_MODE=false
              SIMPLE_HOST=""
              MAPPINGS_FILE=""
              if [[ "$value" == *"->"* ]]; then
                MAPPING_MODE=true
                MAPPINGS_FILE=$(mktemp)
                # Parse old->new pairs into a file: old=new per line
                IFS=',' read -ra PAIRS <<< "$value"
                for pair in "${PAIRS[@]}"; do
                  old_host="${pair%%->*}"
                  new_host="${pair#*->}"
                  echo "${old_host}=${new_host}" >> "$MAPPINGS_FILE"
                done
              else
                SIMPLE_HOST="$value"
              fi

              if [ "$RESOURCE_COUNT" = "0" ]; then
                echo "  ⚠️ No Ingress/HTTPRoute resources found, nothing to patch"
              fi

              while IFS='|' read -r kind name count has_tls hosts tls_hosts; do
                [ -z "$kind" ] && continue

                if [ "$kind" = "Ingress" ]; then
                  PATCH_FILE="${PREFIX}ingress-${name}.yaml"
                  OPS="[]"

                  IFS=',' read -ra HOST_ARRAY <<< "$hosts"
                  idx=0
                  for current_host in "${HOST_ARRAY[@]}"; do
                    if [ "$MAPPING_MODE" = true ]; then
                      mapped=$(lookup_host_mapping "$current_host" "$MAPPINGS_FILE")
                      if [ -n "$mapped" ]; then
                        OPS=$(echo "$OPS" | jq --arg path "/spec/rules/$idx/host" --arg val "$mapped" '. + [{"op":"replace","path":$path,"value":$val}]')
                      fi
                    else
                      OPS=$(echo "$OPS" | jq --arg path "/spec/rules/$idx/host" --arg val "$SIMPLE_HOST" '. + [{"op":"replace","path":$path,"value":$val}]')
                    fi
                    idx=$((idx + 1))
                  done

                  if [ "$has_tls" = "true" ] && [ -n "$tls_hosts" ]; then
                    IFS=',' read -ra TLS_HOST_ARRAY <<< "$tls_hosts"
                    tls_idx=0
                    for current_host in "${TLS_HOST_ARRAY[@]}"; do
                      if [ "$MAPPING_MODE" = true ]; then
                        mapped=$(lookup_host_mapping "$current_host" "$MAPPINGS_FILE")
                        if [ -n "$mapped" ]; then
                          OPS=$(echo "$OPS" | jq --arg path "/spec/tls/0/hosts/$tls_idx" --arg val "$mapped" '. + [{"op":"replace","path":$path,"value":$val}]')
                        fi
                      else
                        OPS=$(echo "$OPS" | jq --arg path "/spec/tls/0/hosts/$tls_idx" --arg val "$SIMPLE_HOST" '. + [{"op":"replace","path":$path,"value":$val}]')
                      fi
                      tls_idx=$((tls_idx + 1))
                    done
                  fi

                  if [ "$(echo "$OPS" | jq 'length')" -gt 0 ]; then
                    echo "$OPS" | yq -P '.' > "$PATCH_FILE"
                    echo "  ✅ Generated $PATCH_FILE"
                    export YQ_PATCH_PATH="$PATCH_FILE"
                    export YQ_TARGET_KIND="Ingress"
                    export YQ_TARGET_NAME="$name"
                    yq -i '.patches += [{"path": env(YQ_PATCH_PATH), "target": {"kind": env(YQ_TARGET_KIND), "name": env(YQ_TARGET_NAME)}}]' kustomization.yaml
                  fi

                elif [ "$kind" = "HTTPRoute" ]; then
                  PATCH_FILE="${PREFIX}httproute-${name}.yaml"
                  if [ "$MAPPING_MODE" = true ]; then
                    OPS="[]"
                    IFS=',' read -ra HOST_ARRAY <<< "$hosts"
                    idx=0
                    for current_host in "${HOST_ARRAY[@]}"; do
                      mapped=$(lookup_host_mapping "$current_host" "$MAPPINGS_FILE")
                      if [ -n "$mapped" ]; then
                        OPS=$(echo "$OPS" | jq --arg path "/spec/hostnames/$idx" --arg val "$mapped" '. + [{"op":"replace","path":$path,"value":$val}]')
                      fi
                      idx=$((idx + 1))
                    done
                    if [ "$(echo "$OPS" | jq 'length')" -gt 0 ]; then
                      echo "$OPS" | yq -P '.' > "$PATCH_FILE"
                      echo "  ✅ Generated $PATCH_FILE"
                      export YQ_PATCH_PATH="$PATCH_FILE"
                      export YQ_TARGET_KIND="HTTPRoute"
                      export YQ_TARGET_NAME="$name"
                      yq -i '.patches += [{"path": env(YQ_PATCH_PATH), "target": {"kind": env(YQ_TARGET_KIND), "name": env(YQ_TARGET_NAME)}}]' kustomization.yaml
                    fi
                  else
                    printf 'apiVersion: gateway.networking.k8s.io/v1\nkind: HTTPRoute\nmetadata:\n  name: %s\nspec:\n  hostnames:\n  - %s\n' "$name" "$SIMPLE_HOST" > "$PATCH_FILE"
                    echo "  ✅ Generated $PATCH_FILE (strategic merge)"
                    export YQ_PATCH_PATH="$PATCH_FILE"
                    export YQ_TARGET_KIND="HTTPRoute"
                    export YQ_TARGET_NAME="$name"
                    yq -i '.patches += [{"path": env(YQ_PATCH_PATH), "target": {"kind": env(YQ_TARGET_KIND), "name": env(YQ_TARGET_NAME)}}]' kustomization.yaml
                  fi
                fi
              done < "$RESOURCES_FILE"

              [ -n "$MAPPINGS_FILE" ] && rm -f "$MAPPINGS_FILE"
              APPLIED_KEYS="${APPLIED_KEYS:+${APPLIED_KEYS},}EXTERNAL_HOST"
              ;;
            *)
              echo "⚠️ Unrecognized key: $key"
              SKIPPED_KEYS="${SKIPPED_KEYS:+${SKIPPED_KEYS},}$key"
              ;;
          esac
        done < "$ENV_PARSED"

        rm -f "$ENV_PARSED" "$RESOURCES_FILE"

        # Phase 5: Outputs
        echo "applied_keys=$APPLIED_KEYS" >> $GITHUB_OUTPUT
        echo "skipped_keys=$SKIPPED_KEYS" >> $GITHUB_OUTPUT
        echo "✅ Environment values applied. Applied: [${APPLIED_KEYS}] Skipped: [${SKIPPED_KEYS}]"

    - name: Normalize image inputs
      id: normalize
      if: inputs.image != '' || inputs.images_json != ''
      shell: bash
      run: |
        set -euo pipefail

        if [ -n "${{ inputs.images_json }}" ]; then
          # Using images_json - ensure image/tag are not provided
          if [ -n "${{ inputs.image }}" ] || [ -n "${{ inputs.tag }}" ]; then
            echo "::error::When using images_json, do not provide image or tag parameters"
            exit 1
          fi
          echo "using_images_json=true" >> $GITHUB_OUTPUT
          echo "normalized_image=" >> $GITHUB_OUTPUT
          echo "normalized_tag=" >> $GITHUB_OUTPUT
        else
          # Not using images_json - require image parameter
          if [ -z "${{ inputs.image }}" ]; then
            echo "::error::Must provide either images_json OR image parameter"
            exit 1
          fi

          # Check if image contains embedded tag (backwards compatibility: image:tag format)
          IMAGE="${{ inputs.image }}"
          if [[ "$IMAGE" =~ ^(.+):([^/]+)$ ]]; then
            # Split image:tag format (backwards compatibility)
            NORMALIZED_IMAGE="${BASH_REMATCH[1]}"
            NORMALIZED_TAG="${BASH_REMATCH[2]}"
            echo "normalized_image=$NORMALIZED_IMAGE" >> $GITHUB_OUTPUT
            echo "normalized_tag=$NORMALIZED_TAG" >> $GITHUB_OUTPUT
            echo "✓ Detected embedded tag in image parameter - image: $NORMALIZED_IMAGE, tag: $NORMALIZED_TAG"
            # Warn if both formats provided
            if [ -n "${{ inputs.tag }}" ]; then
              echo "::warning::Both image:tag format and separate tag parameter provided. Using embedded tag from image."
            fi
          else
            # Image doesn't contain tag, require explicit tag parameter
            if [ -z "${{ inputs.tag }}" ]; then
              echo "::error::Image parameter does not contain a tag. Please provide the tag parameter or use image:tag format."
              exit 1
            fi
            echo "normalized_image=$IMAGE" >> $GITHUB_OUTPUT
            echo "normalized_tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "✓ Using separate image and tag parameters"
          fi
          echo "using_images_json=false" >> $GITHUB_OUTPUT
        fi

    - name: Set images (single or multiple)
      if: inputs.image != '' || inputs.images_json != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail

        # Helper: patch a single image entry using yq (PATCH semantics)
        yq_set_image() {
          local name="$1" new_tag="$2" new_name="${3:-}"

          export YQ_IMG_NAME="$name"
          export YQ_IMG_TAG="$new_tag"

          if yq -e ".images[] | select(.name == env(YQ_IMG_NAME))" kustomization.yaml >/dev/null 2>&1; then
            # Entry exists — patch only provided fields
            yq -i '(.images[] | select(.name == env(YQ_IMG_NAME))).newTag = env(YQ_IMG_TAG)' kustomization.yaml
            if [ -n "$new_name" ]; then
              export YQ_IMG_NEWNAME="$new_name"
              yq -i '(.images[] | select(.name == env(YQ_IMG_NAME))).newName = env(YQ_IMG_NEWNAME)' kustomization.yaml
            fi
          else
            # Entry doesn't exist — append
            if [ -n "$new_name" ]; then
              export YQ_IMG_NEWNAME="$new_name"
              yq -i '.images += [{"name": env(YQ_IMG_NAME), "newName": env(YQ_IMG_NEWNAME), "newTag": env(YQ_IMG_TAG)}]' kustomization.yaml
            else
              yq -i '.images += [{"name": env(YQ_IMG_NAME), "newTag": env(YQ_IMG_TAG)}]' kustomization.yaml
            fi
          fi
        }

        # Process images_json
        if [ -n "${{ inputs.images_json }}" ]; then
          # Validate JSON format
          if ! echo '${{ inputs.images_json }}' | jq empty 2>/dev/null; then
            echo "::error::Invalid images_json format. Expected JSON array like: [{\"name\":\"registry.io/app\",\"newTag\":\"v1.2.3\"}]"
            exit 1
          fi

          # Count images
          IMAGE_COUNT=$(echo '${{ inputs.images_json }}' | jq 'length')

          # Collect image summary for logging
          IMAGE_SUMMARY=$(echo '${{ inputs.images_json }}' | jq -r '.[] | "\(.name):\(.newTag)"' | paste -sd ', ' -)

          # Iterate through images and set each one
          echo '${{ inputs.images_json }}' | jq -c '.[]' | while read -r img; do
            NAME=$(echo "$img" | jq -r '.name // empty')
            NEW_NAME=$(echo "$img" | jq -r '.newName // empty')
            NEW_TAG=$(echo "$img" | jq -r '.newTag // empty')

            if [ -z "$NAME" ]; then
              echo "::error::Image entry missing 'name' field: $img"
              exit 1
            fi

            if [ -z "$NEW_TAG" ]; then
              echo "::error::Image entry missing 'newTag' field: $img"
              exit 1
            fi

            yq_set_image "$NAME" "$NEW_TAG" "$NEW_NAME"
          done

          echo "✅ Set $IMAGE_COUNT image(s): $IMAGE_SUMMARY"

        # Process single image (using normalized values)
        else
          NORM_IMAGE="${{ steps.normalize.outputs.normalized_image }}"
          NORM_TAG="${{ steps.normalize.outputs.normalized_tag }}"

          yq_set_image "$NORM_IMAGE" "$NORM_TAG"
          echo "✅ Set image: $NORM_IMAGE:$NORM_TAG"
        fi
    
    - name: Set version label
      if: inputs.version_label != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "🏷️ Setting version label: ${{ inputs.version_label }}"

        # Check if yq is available
        if ! command -v yq >/dev/null 2>&1; then
          echo "::error::yq not found. Installing yq..."
          # Try to install yq based on the platform
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y yq
          elif command -v brew >/dev/null 2>&1; then
            brew install yq
          else
            # Fallback to downloading binary directly
            echo "Installing yq binary..."
            YQ_VERSION="v4.35.1"
            ARCH=$(uname -m)
            OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
            curl -sL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${OS}_${ARCH}" -o /tmp/yq
            chmod +x /tmp/yq
            sudo mv /tmp/yq /usr/local/bin/yq
          fi
        fi

        VERSION_LABEL="${{ inputs.version_label }}"
        export VERSION_LABEL

        # 1) Remove any old commonLabels version to avoid selector contamination
        yq -i 'del(.commonLabels."app.kubernetes.io/version")' kustomization.yaml 2>/dev/null || true

        # 2) Update existing entry or create new one
        if yq -e '.labels[] | select(.pairs."app.kubernetes.io/version")' kustomization.yaml >/dev/null 2>&1; then
          # Update existing entry and ensure correct settings
          yq -i '(.labels[] | select(.pairs."app.kubernetes.io/version")).pairs."app.kubernetes.io/version" = env(VERSION_LABEL)' kustomization.yaml
          yq -i '(.labels[] | select(.pairs."app.kubernetes.io/version")).includeTemplates = true' kustomization.yaml
          yq -i '(.labels[] | select(.pairs."app.kubernetes.io/version")).includeSelectors = false' kustomization.yaml
        else
          # Add new entry with correct settings
          yq -i '.labels += [{"pairs": {"app.kubernetes.io/version": env(VERSION_LABEL)}, "includeSelectors": false, "includeTemplates": true}]' kustomization.yaml
        fi

        echo "✅ Version label set to: $VERSION_LABEL"
    
    - name: Add annotations
      if: inputs.annotations != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "📝 Adding annotations..."
        echo "${{ inputs.annotations }}" | while IFS= read -r line; do
          # Strip trailing comments and trim whitespace
          line="${line%%#*}"
          line="$(echo "$line" | xargs)"
          [ -z "$line" ] && continue
          
          # Convert all = to : for kustomize format (support both formats)
          line="${line//=/:}"
          echo "  - $line"
          kustomize edit set annotation "$line"
        done
    
    - name: Add labels
      if: inputs.labels != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "🏷️ Adding labels..."
        echo "${{ inputs.labels }}" | while IFS= read -r line; do
          # Strip trailing comments and trim whitespace
          line="${line%%#*}"
          line="$(echo "$line" | xargs)"
          [ -z "$line" ] && continue
          
          # Convert all = to : for kustomize format (support both formats)
          line="${line//=/:}"
          echo "  - $line"
          kustomize edit set label "$line"
        done
    
    - name: Set name prefix
      if: inputs.name_prefix != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "📛 Setting name prefix: ${{ inputs.name_prefix }}"
        kustomize edit set nameprefix "${{ inputs.name_prefix }}"
    
    - name: Set name suffix
      if: inputs.name_suffix != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "📛 Setting name suffix: ${{ inputs.name_suffix }}"
        kustomize edit set namesuffix "${{ inputs.name_suffix }}"
    
    - name: Set namespace
      if: inputs.namespace != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "📁 Setting namespace: ${{ inputs.namespace }}"
        kustomize edit set namespace "${{ inputs.namespace }}"
    
    - name: Set replicas
      if: inputs.replicas != ''
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "🔢 Setting replicas..."
        REPLICAS='${{ inputs.replicas }}'
        
        # Validate JSON
        if ! echo "$REPLICAS" | jq empty 2>/dev/null; then
          echo "::error::Invalid replicas JSON format"
          exit 1
        fi
        
        # Process each replica setting
        echo "$REPLICAS" | jq -c '.[]' | while read -r replica; do
          NAME=$(echo "$replica" | jq -r '.name // empty')
          COUNT=$(echo "$replica" | jq -r '.count // empty')
          if [ -z "$NAME" ] || [ -z "$COUNT" ]; then
            echo "::error::replicas entries must have {\"name\",\"count\"}"
            exit 1
          fi
          echo "  - $NAME: $COUNT replicas"
          kustomize edit set replicas "${NAME}=${COUNT}"
        done

    - name: Validate kustomization
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "✅ Validating kustomization..."
        if ! kustomize build . > /dev/null 2>&1; then
          echo "::error::Kustomization validation failed"
          kustomize build . 2>&1 | head -20
          exit 1
        fi

        # Check that version label is not in selectors (would cause immutable field error)
        if [ -n "${{ inputs.version_label }}" ]; then
          echo "🔍 Checking selectors don't contain version label..."
          MANIFESTS=$(kustomize build .)
          # Use yq to check if any selector.matchLabels contains the version label
          if echo "$MANIFESTS" | yq -e 'select(.spec.selector.matchLabels."app.kubernetes.io/version")' >/dev/null 2>&1; then
            echo "::error::Version label found in selector.matchLabels (immutable field). This would cause deployment to fail."
            echo "::error::The version label should only be in pod templates, not selectors."
            exit 1
          fi
        fi

        echo "✅ Kustomization is valid"
    
    - name: Show debug output
      if: inputs.debug == 'true'
      shell: bash
      working-directory: ${{ inputs.overlay_dir }}
      run: |
        set -euo pipefail
        echo "📋 Final kustomization.yaml:"
        cat kustomization.yaml